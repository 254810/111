events {}
http {
    server {
        # Hugging Face 容器强制要求监听 7860 端口
        listen 7860;
        
        location / {
            # 目标网站地址
            proxy_pass https://aisle.sh/; 
            
            # 开启 SNI 并在握手时发送正确的服务器名称（代理 HTTPS 网站必填）
            proxy_ssl_server_name on;
            proxy_ssl_name aisle.sh;
            
            # 伪装 Host 头部
            proxy_set_header Host aisle.sh; 
            
            # 伪装来源，突破部分网站的防盗链或 CORS 限制
            proxy_set_header Origin "https://aisle.sh";
            proxy_set_header Referer "https://aisle.sh";
            
            # 传递客户端真实信息
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 自动转换目标网站的重定向链接，防止发生跳转后暴露真实域名
            proxy_redirect https://aisle.sh/ /;
        }
    }
}
